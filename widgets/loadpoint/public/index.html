<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --evcc-green: #0FDD42;
    --evcc-green-text: #0a9c30;
    --evcc-green-soft: rgba(15, 221, 66, 0.14);
    --evcc-bg: #ffffff;
    --evcc-card: #ffffff;
    --evcc-text: #1c2445;
    --evcc-muted: #767a8c;
    --evcc-border: #e7e8ee;
    --evcc-track: #eef0ef;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --evcc-green-text: #0FDD42;
      --evcc-bg: #1c2445;
      --evcc-card: #232c54;
      --evcc-text: #f2f3f7;
      --evcc-muted: #9aa0b8;
      --evcc-border: #323c68;
      --evcc-track: #2c3560;
    }
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--evcc-text);
  }

  .card {
    background: var(--evcc-card);
    border: 1px solid var(--evcc-border);
    border-radius: 14px;
    padding: 14px 16px;
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .title {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--evcc-muted);
    flex: 0 0 auto;
  }
  .status-dot.connected { background: #d7a600; }
  .status-dot.charging { background: var(--evcc-green); box-shadow: 0 0 0 3px var(--evcc-green-soft); }

  .stats {
    font-size: 12px;
    color: var(--evcc-muted);
    text-align: right;
    line-height: 1.35;
  }
  .stats strong {
    color: var(--evcc-text);
    font-size: 13px;
  }

  .modes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .mode-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px 4px;
    border-radius: 10px;
    border: 1px solid var(--evcc-border);
    background: transparent;
    color: var(--evcc-muted);
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .mode-btn svg { width: 16px; height: 16px; }
  .mode-btn.active {
    background: var(--evcc-green-soft);
    border-color: var(--evcc-green);
    color: var(--evcc-green-text);
  }
  .mode-btn:active { transform: scale(0.97); }

  .limit-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .limit-label {
    font-size: 12px;
    color: var(--evcc-muted);
    flex: 0 0 auto;
    min-width: 62px;
  }

  input[type="range"] {
    flex: 1 1 auto;
    -webkit-appearance: none;
    height: 6px;
    border-radius: 3px;
    background: var(--evcc-track);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--evcc-green);
    cursor: pointer;
    border: 2px solid var(--evcc-card);
    box-shadow: 0 0 0 1px var(--evcc-green);
  }

  .limit-value {
    font-size: 13px;
    font-weight: 600;
    min-width: 34px;
    text-align: right;
  }

  .empty, .error {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    font-size: 13px;
    color: var(--evcc-muted);
    padding: 12px;
  }
  .error { color: #d0021b; }
</style>
</head>
<body>
  <div class="card" id="app">
    <div class="empty" id="empty">Select a charging point in the widget settings.</div>
  </div>

<script>
  const ICONS = {
    off: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="6" y1="18" x2="18" y2="6"/></svg>',
    pv: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>',
    minpv: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="9" r="3.2"/><path d="M9 2.5v2M9 13.5v2M2.5 9h2M13.5 9h2M4.6 4.6l1.4 1.4M11.4 11.4l1.4 1.4M4.6 13.4l1.4-1.4M11.4 6.6l1.4-1.4"/><path d="M16 13l1.8 3.6L21 18l-3.2 1.4L16 23l-1.8-3.6L11 18l3.2-1.4z" fill="currentColor" stroke="none"/></svg>',
    now: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg>',
  };
  const MODE_LABELS = { off: 'Off', pv: 'Solar', minpv: 'Min+Solar', now: 'Fast' };
  const MODES = ['off', 'pv', 'minpv', 'now'];

  let deviceId = null;
  let pollTimer = null;
  let pendingSocTimer = null;
  let lastRendered = null;

  function fmtPower(w) {
    if (w === null || w === undefined) return '–';
    if (Math.abs(w) >= 1000) return (w / 1000).toFixed(1) + ' kW';
    return Math.round(w) + ' W';
  }

  function render(state) {
    const app = document.getElementById('app');
    lastRendered = state;

    const statusClass = state.charging ? 'charging' : (state.connected ? 'connected' : '');

    app.innerHTML = `
      <div class="header">
        <div class="title"><span class="status-dot ${statusClass}"></span>${escapeHtml(state.name || 'Charging point')}</div>
        <div class="stats">
          <strong>${fmtPower(state.chargePower)}</strong><br>
          ${state.vehicleSoc !== null && state.vehicleSoc !== undefined ? state.vehicleSoc + '%' : '–'}${state.vehicleRange ? ' · ' + Math.round(state.vehicleRange) + ' km' : ''}
        </div>
      </div>
      <div class="modes" id="modes"></div>
      <div class="limit-row">
        <div class="limit-label">Limit</div>
        <input type="range" id="soc" min="0" max="100" step="5" value="${state.targetSoc ?? 80}">
        <div class="limit-value" id="soc-value">${state.targetSoc ?? '–'}%</div>
      </div>
    `;

    const modesEl = document.getElementById('modes');
    MODES.forEach((mode) => {
      const btn = document.createElement('button');
      btn.className = 'mode-btn' + (state.mode === mode ? ' active' : '');
      btn.innerHTML = ICONS[mode] + `<span>${MODE_LABELS[mode]}</span>`;
      btn.addEventListener('click', () => setMode(mode));
      modesEl.appendChild(btn);
    });

    const socInput = document.getElementById('soc');
    const socValue = document.getElementById('soc-value');
    socInput.addEventListener('input', () => {
      socValue.textContent = socInput.value + '%';
    });
    socInput.addEventListener('change', () => {
      setTargetSoc(Number(socInput.value));
    });
  }

  function renderError(message) {
    document.getElementById('app').innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  async function refresh() {
    if (!deviceId) return;
    try {
      const state = await Homey.api('GET', `/loadpoints/${encodeURIComponent(deviceId)}`);
      render(state);
    } catch (err) {
      renderError('Could not reach this charging point.');
    }
  }

  async function setMode(mode) {
    if (!deviceId) return;
    try {
      const state = await Homey.api('POST', `/loadpoints/${encodeURIComponent(deviceId)}/mode`, { mode });
      render(state);
    } catch (err) {
      renderError('Failed to set charging mode.');
    }
  }

  async function setTargetSoc(soc) {
    if (!deviceId) return;
    try {
      const state = await Homey.api('POST', `/loadpoints/${encodeURIComponent(deviceId)}/target-soc`, { soc });
      render(state);
    } catch (err) {
      renderError('Failed to set charge limit.');
    }
  }

  async function init() {
    const settings = await Homey.getWidgetSettings();
    deviceId = settings && settings.device;

    if (!deviceId) {
      document.getElementById('app').innerHTML = '<div class="empty">Select a charging point in the widget settings.</div>';
    } else {
      await refresh();
      pollTimer = setInterval(refresh, 5000);
    }

    Homey.ready();
  }

  init();
</script>
</body>
</html>
