<style>
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  .evcc-form {
    max-width: 420px;
    margin: 24px auto;
  }
  .evcc-form h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
    color: #1c2445;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .evcc-form h1 svg { width: 20px; height: 20px; flex: 0 0 auto; }
  .evcc-form p.hint {
    color: #767676;
    font-size: 13px;
    margin-bottom: 20px;
  }
  .evcc-field {
    margin-bottom: 16px;
  }
  .evcc-field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .evcc-field input {
    width: 100%;
    box-sizing: border-box;
    padding: 10px 12px;
    border: 1px solid #dcdcdc;
    border-radius: 8px;
    font-size: 14px;
  }
  .evcc-field input:focus {
    outline: none;
    border-color: #0FDD42;
  }
  .evcc-error {
    color: #d0021b;
    font-size: 13px;
    margin-bottom: 12px;
    min-height: 16px;
  }
  button.evcc-submit {
    width: 100%;
    padding: 12px;
    background: #1c2445;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button.evcc-submit:hover:not(:disabled) {
    background: #262f5c;
  }
  button.evcc-submit:disabled {
    opacity: 0.6;
    cursor: default;
  }
</style>

<div class="evcc-form">
  <h1><svg viewBox="0 0 170 76" xmlns="http://www.w3.org/2000/svg"><path d="m82.92 22.86h9.22l-6.14 12.3h6.15l-11.53 21.51 2.3-15.36h-7.68z" fill="#0FDD42"/></svg>Connect to evcc</h1>
  <p class="hint">Enter the address of your evcc instance, e.g. <code>http://192.168.1.50:7070</code>. Only fill in a password if you configured a login on evcc.</p>

  <div class="evcc-field">
    <label for="evcc-host">evcc URL</label>
    <input type="text" id="evcc-host" placeholder="http://192.168.1.50:7070" autocapitalize="off" autocorrect="off" />
  </div>

  <div class="evcc-field">
    <label for="evcc-password">Password (optional)</label>
    <input type="password" id="evcc-password" placeholder="" />
  </div>

  <div class="evcc-error" id="evcc-error"></div>

  <button class="evcc-submit" id="evcc-submit">Connect</button>
</div>

<script>
  Homey.on('prefill', (data) => {
    if (data && data.host) document.getElementById('evcc-host').value = data.host;
  });
  Homey.emit('get-prefill', {}).catch(() => {});

  const submitBtn = document.getElementById('evcc-submit');
  const errorEl = document.getElementById('evcc-error');

  submitBtn.addEventListener('click', async () => {
    const host = document.getElementById('evcc-host').value.trim();
    const password = document.getElementById('evcc-password').value;

    errorEl.textContent = '';
    if (!host) {
      errorEl.textContent = 'Please enter the evcc URL.';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Connecting…';

    try {
      await Homey.emit('connect', { host, password });
      Homey.showView('list_devices');
    } catch (err) {
      errorEl.textContent = (err && err.message) || 'Could not connect to evcc. Check the URL and try again.';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Connect';
    }
  });
</script>
